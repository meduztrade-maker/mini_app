// ─── GALAXY CANVAS ────────────────────────────────────────────
function GalaxyCanvas() {
  const ref = useRef(null);
  useEffect(() => {
    const cv = ref.current;
    const ctx = cv.getContext("2d");
    let W, H, fr = 0, raf;
    const resize = () => { W = cv.width = innerWidth; H = cv.height = innerHeight; };
    resize(); addEventListener("resize", resize);

    // Stars
    const stars = Array.from({ length: 180 }, () => ({
      x: Math.random(), y: Math.random(),
      r: Math.random() * 1.6 + 0.2,
      a: Math.random() * 0.7 + 0.1,
      va: (Math.random() - 0.5) * 0.006,
      vy: -Math.random() * 0.00015 - 0.00005,
    }));

    // Liquid nebula blobs
    const blobs = [
      { x:.75, y:.1,  r:.32, vx:.00028, vy:.00020, c:"120,40,220", ph:0   },
      { x:.1,  y:.7,  r:.24, vx:-.0002, vy:-.00025,c:"30,100,255", ph:2.1 },
      { x:.5,  y:.45, r:.2,  vx:.00025, vy:.00035, c:"200,40,160", ph:4.2 },
      { x:.85, y:.8,  r:.22, vx:.00020, vy:-.00022,c:"0,180,255",  ph:1.5 },
      { x:.2,  y:.15, r:.15, vx:-.00028,vy:.00018, c:"100,50,255", ph:3.3 },
    ];

    // Touch ripples
    const ripples = [];
    const onTouch = e => {
      const t = e.touches ? e.touches[0] : e;
      ripples.push({ x: t.clientX, y: t.clientY, r: 0, a: 0.7, vr: 3 });
    };
    addEventListener("touchstart", onTouch, { passive: true });
    addEventListener("click", onTouch);

    const draw = () => {
      ctx.clearRect(0, 0, W, H);
      fr++;

      // Deep space gradient base
      const bg = ctx.createRadialGradient(W*.5, H*.3, 0, W*.5, H*.5, Math.max(W,H));
      bg.addColorStop(0, "rgba(10,5,35,0)");
      bg.addColorStop(1, "rgba(3,2,18,0)");
      ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

      // Nebula blobs
      blobs.forEach(b => {
        b.x += b.vx; b.y += b.vy;
        if (b.x < -.2 || b.x > 1.2) b.vx *= -1;
        if (b.y < -.2 || b.y > 1.2) b.vy *= -1;
        const wobble = Math.sin(fr * .012 + b.ph) * .035;
        const bcx = b.x * W, bcy = b.y * H;
        const br = (b.r + wobble) * Math.min(W, H);
        const g = ctx.createRadialGradient(bcx, bcy, 0, bcx, bcy, br);
        g.addColorStop(0,   `rgba(${b.c},.22)`);
        g.addColorStop(.4,  `rgba(${b.c},.09)`);
        g.addColorStop(1,   `rgba(${b.c},0)`);
        ctx.beginPath();
        const pts = 14;
        for (let i = 0; i <= pts * 2; i++) {
          const ang = i / pts * Math.PI;
          const w = 1 + .16 * Math.sin(ang*3 + fr*.015 + b.ph)
                      + .07 * Math.sin(ang*7 - fr*.011 + b.ph)
                      + .04 * Math.cos(ang*5 + fr*.019 + b.ph);
          ctx.lineTo(bcx + Math.cos(ang) * br * w, bcy + Math.sin(ang) * br * w);
        }
        ctx.closePath(); ctx.fillStyle = g; ctx.fill();
      });

      // Floating stars
      stars.forEach(s => {
        s.y += s.vy; s.a += s.va;
        if (s.a < .05) { s.a = .05; s.va *= -1; }
        if (s.a > .8)  { s.a = .8;  s.va *= -1; }
        if (s.y < -.02) s.y = 1.02;
        ctx.beginPath();
        ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
        // Neon tint for some stars
        const neon = s.r > 1.2 ? `rgba(180,160,255,${s.a})` : `rgba(255,255,255,${s.a})`;
        ctx.fillStyle = neon; ctx.fill();
        // Glow for bright stars
        if (s.r > 1.3) {
          const sg = ctx.createRadialGradient(s.x*W, s.y*H, 0, s.x*W, s.y*H, s.r*5);
          sg.addColorStop(0, `rgba(160,120,255,${s.a*.4})`);
          sg.addColorStop(1, "rgba(0,0,0,0)");
          ctx.beginPath(); ctx.arc(s.x*W, s.y*H, s.r*5, 0, Math.PI*2);
          ctx.fillStyle = sg; ctx.fill();
        }
      });

      // Touch ripples
      for (let i = ripples.length - 1; i >= 0; i--) {
        const rp = ripples[i];
        rp.r += rp.vr; rp.a -= .018; rp.vr *= .94;
        if (rp.a <= 0) { ripples.splice(i, 1); continue; }
        [1, 0.55, 0.3].forEach((scale, idx) => {
          ctx.beginPath();
          ctx.arc(rp.x, rp.y, rp.r * scale, 0, Math.PI * 2);
          const colors = ["139,92,246", "59,130,246", "0,200,255"];
          ctx.strokeStyle = `rgba(${colors[idx]},${rp.a * (1 - idx * .25)})`;
          ctx.lineWidth = 1.5 - idx * .3;
          ctx.stroke();
        });
      }

      raf = requestAnimationFrame(draw);
    };
    draw();
    return () => { cancelAnimationFrame(raf); removeEventListener("resize", resize); removeEventListener("touchstart", onTouch); removeEventListener("click", onTouch); };
  }, []);

  return <canvas ref={ref} style={{ position:"fixed", inset:0, zIndex:0, pointerEvents:"none" }} />;
}

                  whileTap={{ scale:.98 }}
                  whileHover={{ borderColor:"rgba(139,92,246,0.55)", scale:1.01 }}

                {submitting ? (

            </motion.div>
          )}

          {/* STEP 3 — SUCCESS */}
          {step===3 && (
            <motion.div key="s3" variants={stepVariants} initial="enter" animate="center" exit="exit" transition={{ type:"spring", stiffness:280, damping:26 }}>
              <div style={{ paddingTop:48, textAlign:"center", display:"flex", flexDirection:"column", alignItems:"center", gap:18 }}>

                  />
                  <div style={{ position:"absolute", inset:2, borderRadius:"50%", background:"rgba(3,2,18,0.97)" }} />
                  <motion.div
                    initial={{ scale:0, rotate:-180 }}

                    transition={{ type:"spring", stiffness:220, damping:18, delay:.1 }}
                    style={{ position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"center", fontSize:52 }}
                  >✓</motion.div>
                </div>

                <motion.div initial={{ opacity:0, y:12 }} animate={{ opacity:1, y:0 }} transition={{ delay:.3 }} style={{ fontSize:26, fontWeight:900 }}>
                  Qabul qilindi!
                </motion.div>
                <motion.div initial={{ opacity:0 }} animate={{ opacity:1 }} transition={{ delay:.45 }}
                  style={{ fontSize:14, color:"rgba(255,255,255,0.5)", lineHeight:1.7, padding:"0 8px" }}>
                  🆔 #{orderId}<br />
                  📦 {product.name}<br />
                  👤 @{username.trim().replace("@","")}<br /><br />
                  ⏳ 15–30 daqiqa ichida jo'natiladi<br />
                  ❓ Savol: @iammeduz
                </motion.div>
                <motion.div initial={{ opacity:0, y:16 }} animate={{ opacity:1, y:0 }} transition={{ delay:.6 }} style={{ width:"100%", display:"flex", flexDirection:"column", gap:10 }}>
                  <LiquidBtn onClick={onClose}>🛒 Yana xarid qilish</LiquidBtn>
                  <LiquidBtn variant="secondary" onClick={onClose}>📋 Buyurtmalarimni ko'rish</LiquidBtn>
                </motion.div>
              </div>
            </motion.div>
          )}
        </AnimatePresence>
      </div>
    </motion.div>
  );
}

                        ))}
                      </div>
                    </div>
                  </motion.div>
                ))}
              </div>
            </motion.div>
          )}

        </AnimatePresence>
      </div>

      {/* Nav */}
      <NavBar page={page} setPage={setPage} isAdmin={isAdm} />

      {/* Order overlay */}
      <AnimatePresence>
        {orderProduct && (
          <OrderOverlay product={orderProduct.product} type={orderProduct.type} onClose={closeOrder} />
        )}
      </AnimatePresence>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
